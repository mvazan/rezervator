name: Release

# Push a tag like v1.0.0 and this builds a signed release APK (for direct
# install / sharing) and a signed AAB (App Bundle, for Google Play), then
# publishes both on the GitHub Releases page and uploads the AAB to Play's
# internal testing track as a draft. Bump `version:` in pubspec.yaml before
# tagging so the versionCode grows and Android/Play accept the update.
#
# The Play "what's new" text comes from the annotated tag's message body
# (everything after the first line). Tag with:
#   git tag -a v1.1.0 -m "v1.1.0" -m "- Oprava X\n- Nová funkce Y"
# A lightweight tag (no -m body) falls back to a generic note.
on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore signing keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d \
            > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build signed APK + AAB
        env:
          DEFINES: >-
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            --dart-define=FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
            --dart-define=FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
            --dart-define=FIREBASE_SENDER_ID=${{ secrets.FIREBASE_SENDER_ID }}
            --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          flutter build apk --release $DEFINES         # direct install / sharing
          flutter build appbundle --release $DEFINES   # Google Play

      - name: Name the artifacts
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             rezervator-${{ github.ref_name }}.apk
          cp build/app/outputs/bundle/release/app-release.aab \
             rezervator-${{ github.ref_name }}.aab

      # "What's new" for Play, from the annotated tag's message body (the
      # part after the subject line). No body -> a generic Czech note so the
      # upload never fails on a missing file.
      - name: Generate Play release notes from the tag
        run: |
          mkdir -p whatsnew
          BODY="$(git tag -l --format='%(contents:body)' "${GITHUB_REF_NAME}")"
          if [ -z "${BODY//[[:space:]]/}" ]; then
            BODY="Vylepšení a opravy chyb."
          fi
          # Play caps release notes at 500 chars.
          printf '%s\n' "$BODY" | head -c 500 > whatsnew/whatsnew-cs-CZ.txt
          echo "----- whatsnew-cs-CZ.txt -----"
          cat whatsnew/whatsnew-cs-CZ.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rezervator-*.apk
            rezervator-*.aab
          generate_release_notes: true

      # Upload the AAB straight to Google Play internal testing. Creates a
      # DRAFT release on the internal track — review and roll it out to
      # testers manually in Play Console. Needs the play-uploader service
      # account with "Release apps to testing tracks" on the Rezervátor app.
      # NOTE: the FIRST AAB for a brand-new Play app must be uploaded by hand
      # in Play Console; the API can push every release after that.
      - name: Upload AAB to Play internal testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: cz.kuzelky.rezervator
          releaseFiles: rezervator-${{ github.ref_name }}.aab
          whatsNewDirectory: whatsnew
          track: internal
          status: draft
