# Remote config pro `supabase config push` — jen sekce, které spravujeme
# (SMTP + auth URL). Heslo se bere z env(SMTP_PASS), do repa nepatří.
project_id = "wgwijvcnslkesyqgaeul"

[auth]
site_url = "https://mvazan.github.io/rezervator/"
additional_redirect_urls = [
  "cz.kuzelky.rezervator://login-callback",
  "https://mvazan.github.io/rezervator/",
  "http://localhost:**",
]

[auth.email.smtp]
enabled = true
host = "smtp.gmail.com"
port = 587
user = "milos.vazan@gmail.com"
pass = "env(SMTP_PASS)"
admin_email = "milos.vazan@gmail.com"
sender_name = "Rezervátor"

# Česká šablona přihlašovacího e-mailu — obsahuje odkaz i číselný kód
# ({{ .Token }}), aby fungoval fallback „Zadat kód z e-mailu".
[auth.email.template.magic_link]
subject = "Přihlášení do Rezervátoru"
content_path = "./supabase/templates/magic_link.html"
